<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="ongki.pro x Mengantar - Official Partner - Dokumentasi API">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <style>
      .brand { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 800; }
      .sub   { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; letter-spacing: 3px; }
      .x     { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; }
    </style>
  </defs>

  <rect width="1200" height="260" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="12" height="260" rx="6" fill="url(#accent)"/>

  <!-- package icon -->
  <g transform="translate(56,86)" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linejoin="round">
    <rect x="2" y="2" width="84" height="84" rx="10"/>
    <line x1="2" y1="44" x2="86" y2="44"/>
    <line x1="44" y1="2" x2="44" y2="44"/>
    <rect x="30" y="14" width="28" height="18" rx="4" fill="url(#accent)" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="180" y="118" class="brand" font-size="58" fill="#ffffff">ongki<tspan fill="#34d399">.pro</tspan></text>
  <text x="470" y="118" class="x" font-size="46" fill="#64748b">×</text>
  <text x="520" y="118" class="brand" font-size="58" fill="#e2e8f0">Mengantar</text>

  <!-- subtitle -->
  <text x="182" y="162" class="sub" font-size="20" fill="#22d3ee">OFFICIAL PARTNER</text>
  <text x="182" y="196" class="sub" font-size="17" fill="#94a3b8">DOKUMENTASI &amp; TOOLKIT INTEGRASI API</text>

  <!-- courier chips -->
  <g class="sub" font-size="13" fill="#cbd5e1" transform="translate(182,222)">
    <text x="0" y="0">JNE · SiCepat · J&amp;T · AnterAja · Ninja · Lion · IDExpress · SAP</text>
  </g>

  <!-- partner badge pill -->
  <g transform="translate(980,40)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="28" cy="22" r="8" fill="url(#accent)"/>
    <text x="48" y="28" class="sub" font-size="15" fill="#e2e8f0">PARTNER</text>
  </g>
</svg>
